[build]
  base = "."
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20.19.0"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Force HTTP → HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Quarantine archive content even if it ends up under the deployed publish path.
[[redirects]]
  from = "/_archive/*"
  to = "/404"
  status = 404
  force = true

# Block access via the netlify.app subdomain; canonicalise to cravelle.co
[[redirects]]
  from = "https://*.netlify.app/*"
  to = "https://cravelle.co/:splat"
  status = 301
  force = true

# Single-page app fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 3000
  publish = "dist"
  autoLaunch = false
