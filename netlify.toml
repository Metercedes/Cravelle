[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"

# Netlify Forms configuration
[forms]
  # This matches the form name in the HTML (name="contact")

# Asset optimization
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Force HTTP to HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Redirect netlify.app subdomain to custom domain (block direct access)
[[redirects]]
  from = "https://*.netlify.app/*"
  to = "https://cravelle.co/:splat"
  status = 301
  force = true

# Netlify Functions API routes
[[redirects]]
  from = "/api/admin-action"
  to = "/.netlify/functions/admin-action"
  status = 200

[[redirects]]
  from = "/api/submit-trade-lead"
  to = "/.netlify/functions/submit-trade-lead"
  status = 200

[[redirects]]
  from = "/api/submit-inquiry"
  to = "/.netlify/functions/submit-inquiry"
  status = 200

[[redirects]]
  from = "/api/manage-users"
  to = "/.netlify/functions/manage-users"
  status = 200

[[redirects]]
  from = "/api/update-request-status"
  to = "/.netlify/functions/update-request-status"
  status = 200

[[redirects]]
  from = "/api/user-dashboard"
  to = "/.netlify/functions/user-dashboard"
  status = 200

[[redirects]]
  from = "/api/setup-totp"
  to = "/.netlify/functions/setup-totp"
  status = 200

[[redirects]]
  from = "/api/verify-totp"
  to = "/.netlify/functions/verify-totp"
  status = 200

[[redirects]]
  from = "/api/verify-turnstile"
  to = "/.netlify/functions/verify-turnstile"
  status = 200

# Dev server configuration
[dev]
  command = "npm run dev"
  port = 3000
  publish = "dist"
  autoLaunch = false
