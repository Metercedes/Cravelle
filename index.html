    <script>
      // Theme bootstrapping. Runs before first paint to avoid a light/dark
      // flash. Behaviour:
      //   - If the user has explicitly chosen a theme, use that (localStorage).
      //   - Otherwise follow prefers-color-scheme.
      //   - If no manual choice is stored, keep listening to system changes
      //     and update live; the moment the user toggles, we stop following.
      (function () {
        var STORAGE_KEY = 'cravelle:theme';
        var mql = window.matchMedia('(prefers-color-scheme: dark)');
        function readStored() {
          try {
            var v = localStorage.getItem(STORAGE_KEY);
            return v === 'dark' || v === 'light' ? v : null;
          } catch (_) { return null; }
        }
        function apply(theme) {
          document.documentElement.dataset.theme = theme;
          try {
            window.dispatchEvent(new CustomEvent('cravelle:theme', { detail: theme }));
          } catch (_) { /* IE — not a target browser, ignore */ }
        }
        var stored = readStored();
        apply(stored || (mql.matches ? 'dark' : 'light'));
        // Live system-theme follower. Runs only while no manual preference
        // exists; manual toggle writes to localStorage and short-circuits
        // this branch.
        function onSystemChange(e) {
          if (readStored()) return;
          apply(e.matches ? 'dark' : 'light');
        }
        if (typeof mql.addEventListener === 'function') {
          mql.addEventListener('change', onSystemChange);
        } else if (typeof mql.addListener === 'function') {
          mql.addListener(onSystemChange);
        }
      })();
    </script>

    <!--
      Intro overlay. Pure CSS animation, no framework dependency. Rendered
      eagerly so the brand reveal can paint before React hydrates. Removed
      from the DOM after the animation ends. Only plays on the homepage.
    -->
    <div id="intro" hidden aria-hidden="true">
      <div class="intro-lockup">
        <span class="intro-mark" role="img" aria-label="Cravelle"></span>
        <span class="intro-caption" aria-label="Cravelle"
          ><span aria-hidden="true">C</span><span aria-hidden="true">r</span><span aria-hidden="true">a</span><span aria-hidden="true">v</span><span aria-hidden="true">e</span><span aria-hidden="true">l</span><span aria-hidden="true">l</span><span aria-hidden="true">e</span></span>
      </div>
    </div>
    <script>
      (function () {
        if (location.pathname !== '/') return;
        var intro = document.getElementById('intro');
        if (!intro) return;
        var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        intro.removeAttribute('hidden');
        intro.dataset.mode = reduce ? 'reduce' : 'play';
        var dur = reduce ? 900 : 2500;
        setTimeout(function () {
          if (intro && intro.parentNode) intro.parentNode.removeChild(intro);
        }, dur);
      })();
    </script>
