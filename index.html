    <script>
      // Apply persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('cravelle:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'dark' || stored === 'light'
            ? stored
            : (prefersDark ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <!--
      Intro overlay. Pure CSS animation, no framework dependency. Rendered
      eagerly so the brand reveal can paint before React hydrates. Removed
      from the DOM after the animation ends. Only plays on the homepage.
    -->
    <div id="intro" hidden aria-hidden="true">
      <div class="intro-lockup">
        <span class="intro-mark" aria-hidden="true"></span>
        <span class="intro-caption">Cravelle</span>
      </div>
    </div>
    <script>
      (function () {
        if (location.pathname !== '/') return;
        var intro = document.getElementById('intro');
        if (!intro) return;
        var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        intro.removeAttribute('hidden');
        intro.dataset.mode = reduce ? 'reduce' : 'play';
        var dur = reduce ? 900 : 2450;
        setTimeout(function () {
          if (intro && intro.parentNode) intro.parentNode.removeChild(intro);
        }, dur);
      })();
    </script>
