    <!--
      Load Google Fonts CSS without blocking render. The print-media trick
      lets the browser fetch and parse the stylesheet in the background, then
      the onload handler swaps it to the real media so it applies. The
      <noscript> fallback ensures fonts still load with JS disabled.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=optional"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=optional"
      />
    </noscript>

    <title>Cravelle, the B2B bridge into Europe.</title>

    <script>
      // Apply persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('cravelle:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'dark' || stored === 'light'
            ? stored
            : (prefersDark ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
