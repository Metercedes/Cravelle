<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1c2228" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#F6F1E8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top eyebrow -->
  <text x="64" y="80" fill="#6E6F70" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3">CRAVELLE  /  POLAND BASED  /  B2B BRIDGE INTO EUROPE</text>
  <line x1="64" y1="92" x2="1136" y2="92" stroke="#1c2228" stroke-opacity="0.18" stroke-dasharray="6 6"/>

  <!-- Subtle route line (no coordinates) -->
  <g stroke="#1c2228" stroke-width="2" stroke-linecap="round" fill="none" transform="translate(64,470)">
    <path d="M0 0 Q150 0 280 -30 Q420 -65 600 -90 Q780 -115 1072 -130"/>
    <circle cx="0" cy="0" r="6" fill="#B88A55" stroke="none"/>
    <circle cx="1072" cy="-130" r="6" fill="#244C5A" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="64" y="270" fill="#1c2228" font-family="Fraunces, ui-serif, Georgia, serif" font-size="148" font-weight="400" letter-spacing="-3">The B2B bridge</text>
  <text x="64" y="392" fill="#244C5A" font-family="Fraunces, ui-serif, Georgia, serif" font-size="148" font-weight="400" font-style="italic" letter-spacing="-3">into Europe.</text>

  <!-- Footer -->
  <text x="64" y="572" fill="#1c2228" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500">cravelle.co</text>
  <text x="1136" y="572" fill="#6E6F70" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3" text-anchor="end">EXPORT  /  INTRODUCTIONS  /  MARKET ENTRY</text>
</svg>
