<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Legacy Site Quarantined</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4efe8;
        color: #1f2328;
      }
      main {
        width: min(680px, 92vw);
        background: #ffffff;
        border: 1px solid #dfd5c7;
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.4rem, 2.5vw, 2rem);
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.5;
      }
      code {
        background: #f3f4f6;
        padding: 0.12rem 0.34rem;
        border-radius: 0.3rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Legacy site quarantined</h1>
      <p>
        This folder is archived and should not be published.
      </p>
      <p>
        Netlify must build from the repository root with <code>npm run build</code> and publish <code>dist</code>.
      </p>
      <p>
        If you are seeing this page, update Netlify site settings and redeploy the latest commit from <code>main</code>.
      </p>
    </main>
  </body>
</html>
